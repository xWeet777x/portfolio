<style>

body{
    margin:0;
    background:#06070b;
    min-height:100vh;
    display:grid;
    place-items:center;
    font-family:Inter;
}

.music-widget{
    width:300px;
    height:200px;
    border-radius:45px;
    overflow:hidden;
    position:relative;
    color:white;
    box-shadow:
    0 40px 80px rgba(0,0,0,.5);
}

.bg{
    position:absolute;
    inset:0;

    background-size:cover;
    background-position:center;

    filter:
    blur(0px)
    brightness(.85);

    transform:scale(1.08);

    opacity:.95;
}

.overlay{
    position:absolute;
    inset:0;

    background:
    linear-gradient(
        90deg,
        rgba(10,12,18,.65),
        rgba(10,12,18,.1)
    );
}

.top{
    position:relative;

    display:flex;

    justify-content:
    space-between;

    padding:28px;
}

.spotify{

width:20px;
height:20px;

border-radius:50%;

background:white;

color:black;

display:grid;
place-items:center;

}

.spotify svg{
width:24px;
}

.device{

background:
rgba(255,255,255,.88);

padding:
12px 22px;

border-radius:999px;

color:#111;

font-size:5px;

font-weight:700;

backdrop-filter:blur(10px);

}

.content{

position:absolute;

left:40px;
right:40px;

bottom:120px;

display:flex;

justify-content:
space-between;

align-items:center;

}

h1{

margin:0;

font-size:30px;

font-weight:800;

}

h2{

margin-top:5px;

font-size:20px;

font-weight:500;

color:
rgba(255,255,255,.82);

}

#play{

width:95px;
height:95px;

border:0;

border-radius:28px;

background:
rgba(255,255,255,.9);

font-size:42px;

cursor:pointer;

}

.bottom{

position:absolute;

left:35px;
right:35px;

bottom:25px;

display:flex;

gap:20px;

align-items:center;

}

.bottom button{

background:none;

border:none;

color:white;

font-size:28px;

}

.wave{
font-size:34px;
}

.bar{

flex:1;

height:6px;

border-radius:99px;

background:
rgba(255,255,255,.25);

overflow:hidden;

}

#progress{

width:30%;

height:100%;

background:white;

border-radius:99px;

}

</style>

<script>

const apiKey="fb9358a0585f12d5a5f88ade4192fead";
const user="josemar17";

async function now(){

const url=
`https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks&user=${user}&api_key=${apiKey}&format=json&limit=1`;

const r=
await fetch(url);

const d=
await r.json();

const t=
d.recenttracks.track[0];

music.innerText=
t.name;

artist.innerText=
t.artist["#text"];

const img=
t.image.at(-1)["#text"];

bg.style.backgroundImage=
`url(${img})`;

}

now();

setInterval(
now,
30000
);

</script>
