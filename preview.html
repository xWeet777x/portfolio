
<div class="music-widget">
  <div class="bg" id="bg"></div>
  <div class="overlay"></div>

  <div class="top">
    <div class="spotify">
      <svg viewBox="0 0 24 24">
        <path fill="currentColor" d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20Zm4.59 14.42c-.2.33-.59.42-.92.22-2.17-1.33-4.89-1.64-8.1-.94-.37.09-.74-.16-.82-.53-.09-.37.16-.74.53-.82 3.56-.79 6.61-.41 9.11 1.11.33.2.42.59.2.96Zm1.2-2.77c-.25.4-.75.52-1.15.27-2.49-1.53-6.29-1.97-9.23-1.07-.45.15-.91-.11-1.05-.55-.14-.44.11-.91.55-1.05 3.38-1.03 7.58-.54 10.63 1.32.41.25.51.76.25 1.08Z"/>
      </svg>
    </div>
  </div>

  <div class="content">
    <h1 id="music">Carregando...</h1>
    <h2 id="artist">Buscando Last.fm</h2>
  </div>

  <div class="bottom">
    <div class="bar">
      <div id="progress"></div>
    </div>
    <button id="playBtn">▶</button>
  </div>
</div>

<style>
  body {
    margin: 0;
    background: #06070b;
    min-height: 100vh;
    display: grid;
    place-items: center;
    font-family: Inter, Arial, sans-serif;
  }

  .music-widget {
    width: 320px;
    height: 220px;
    border-radius: 42px;
    overflow: hidden;
    position: relative;
    color: white;
    background: #111;
    box-shadow: 0 30px 70px rgba(0,0,0,.55);
  }

  .bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    transform: scale(1.08);
    opacity: .92;
    filter: brightness(.78) saturate(1.2);
  }

  .overlay {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(90deg, rgba(6,8,14,.82), rgba(6,8,14,.18)),
      linear-gradient(0deg, rgba(6,8,14,.45), transparent 55%);
  }

  .top {
    position: relative;
    z-index: 2;
    padding: 24px 26px;
  }

  .spotify {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    background: rgba(255,255,255,.9);
    color: #1db954;
    display: grid;
    place-items: center;
    box-shadow: 0 8px 25px rgba(0,0,0,.25);
  }

  .spotify svg {
    width: 30px;
  }

  .content {
    position: absolute;
    z-index: 2;
    left: 34px;
    right: 24px;
    bottom: 74px;
  }

  h1 {
    margin: 0;
    font-size: 22px;
    line-height: 1.05;
    font-weight: 850;
    letter-spacing: -0.04em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  h2 {
    margin: 7px 0 0;
    font-size: 18px;
    font-weight: 500;
    color: rgba(255,255,255,.78);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .bottom {
    position: absolute;
    z-index: 2;
    left: 34px;
    right: 30px;
    bottom: 24px;
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .bar {
    flex: 1;
    height: 5px;
    border-radius: 99px;
    background: rgba(255,255,255,.28);
    overflow: hidden;
  }

  #progress {
    width: 30%;
    height: 100%;
    background: white;
    border-radius: 99px;
    animation: progressMove 30s linear infinite;
  }

  #playBtn {
    background: none;
    border: none;
    color: white;
    font-size: 24px;
    cursor: pointer;
  }

  @keyframes progressMove {
    from { width: 5%; }
    to { width: 90%; }
  }
</style>

<script>
  const apiKey = "fb9358a0585f12d5a5f88ade4192fead";
  const user = "josemar17";

  async function now() {
    try {
      const url = `https://ws.audioscrobbler.com/2.0/?method=user.getrecenttracks&user=${user}&api_key=${apiKey}&format=json&limit=1`;
      const response = await fetch(url);
      const data = await response.json();

      const track = data?.recenttracks?.track?.[0];
      if (!track) throw new Error("Nenhuma música encontrada");

      const isPlaying = track["@attr"]?.nowplaying === "true";
      const image = track.image?.at(-1)?.["#text"];

      document.getElementById("music").textContent = track.name || "Música desconhecida";
      document.getElementById("artist").textContent = track.artist?.["#text"] || "Artista desconhecido";
      document.getElementById("playBtn").textContent = isPlaying ? "❚❚" : "▶";

      if (image) {
        document.getElementById("bg").style.backgroundImage = `url(${image})`;
      } else {
        document.getElementById("bg").style.background =
          "linear-gradient(135deg, #1d4ed8, #7c3aed, #db2777)";
      }
    } catch (error) {
      document.getElementById("music").textContent = "Nada tocando";
      document.getElementById("artist").textContent = "Last.fm indisponível";
      document.getElementById("playBtn").textContent = "▶";
      document.getElementById("bg").style.background =
        "linear-gradient(135deg, #0f172a, #1e293b, #334155)";
    }
  }

  now();
  setInterval(now, 30000);
</script>
